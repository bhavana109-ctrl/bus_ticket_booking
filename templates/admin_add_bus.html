<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Bus - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            background: #343a40;
            min-height: 100vh;
            color: white;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,.75);
            padding: 0.75rem 1rem;
        }
        .sidebar .nav-link:hover {
            color: white;
            background: rgba(255,255,255,.1);
        }
        .sidebar .nav-link.active {
            color: white;
            background: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3">
                    <h5 class="text-center mb-4">
                        <i class="fas fa-bus"></i> Admin Panel
                    </h5>
                    <nav class="nav flex-column">
                        <a class="nav-link" href="/admin/dashboard">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                        <a class="nav-link active" href="/admin/buses">
                            <i class="fas fa-bus"></i> Manage Buses
                        </a>
                        <a class="nav-link" href="/admin/users">
                            <i class="fas fa-users"></i> Users
                        </a>
                        <a class="nav-link" href="/admin/bookings">
                            <i class="fas fa-ticket-alt"></i> Bookings
                        </a>
                        <hr class="my-3">
                        <a class="nav-link" href="/admin/logout">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </nav>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-plus"></i> Add New Bus</h2>
                    <a href="/admin/buses" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Buses
                    </a>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>Bus Information</h5>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-success">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="bus_name" class="form-label">Bus Name *</label>
                                        <input type="text" class="form-control" id="bus_name" name="bus_name"
                                               placeholder="e.g., Super Express AC" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="bus_type" class="form-label">Bus Type *</label>
                                        <select class="form-control" id="bus_type" name="bus_type" required>
                                            <option value="AC">AC</option>
                                            <option value="Non-AC">Non-AC</option>
                                            <option value="Sleeper">Sleeper</option>
                                            <option value="Semi-Sleeper">Semi-Sleeper</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="source" class="form-label">Source City *</label>
                                        <input type="text" class="form-control" id="source" name="source"
                                               placeholder="e.g., Kochi" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="destination" class="form-label">Destination City *</label>
                                        <input type="text" class="form-control" id="destination" name="destination"
                                               placeholder="e.g., Calicut" required>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="travel_date" class="form-label">Travel Date *</label>
                                        <input type="date" class="form-control" id="travel_date" name="travel_date" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="departure_time" class="form-label">Departure Time *</label>
                                        <input type="time" class="form-control" id="departure_time" name="departure_time" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="arrival_time" class="form-label">Arrival Time *</label>
                                        <input type="time" class="form-control" id="arrival_time" name="arrival_time" required>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="price" class="form-label">Price per Seat (₹) *</label>
                                        <input type="number" class="form-control" id="price" name="price"
                                               step="0.01" min="1" placeholder="500.00" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="seats_total" class="form-label">Total Seats *</label>
                                        <input type="number" class="form-control" id="seats_total" name="seats_total"
                                               min="1" max="60" value="40" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="image_url" class="form-label">Image URL</label>
                                        <input type="url" class="form-control" id="image_url" name="image_url"
                                               placeholder="https://example.com/bus-image.jpg">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="amenities" class="form-label">Amenities</label>
                                <textarea class="form-control" id="amenities" name="amenities" rows="3"
                                          placeholder="WiFi, AC, Snacks, TV, etc."></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-save"></i> Add Bus
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('travel_date').setAttribute('min', today);
    </script>
</body>
</html>

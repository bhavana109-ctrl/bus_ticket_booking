<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats - {{ bus.bus_name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        .bus-layout {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .seat {
            width: 40px;
            height: 40px;
            margin: 5px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
            display: inline-block;
            text-align: center;
            line-height: 36px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .seat.available {
            background: #28a745;
            color: white;
        }
        .seat.available:hover {
            background: #218838;
            transform: scale(1.05);
        }
        .seat.booked {
            background: #dc3545;
            color: white;
            cursor: not-allowed;
        }
        .seat.selected {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        .seat-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }
        .driver-area {
            background: #6c757d;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .booking-summary {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">

            <!-- Header -->
            <div class="text-center mb-4">
                <h2><i class="fas fa-chair"></i> Select Your Seats</h2>
                <h4 class="text-primary">{{ bus.bus_name }}</h4>
                <p>{{ bus.source }} → {{ bus.destination }}</p>
                <p class="text-muted">{{ bus.travel_date }} | {{ bus.departure_time }} - {{ bus.arrival_time }}</p>
            </div>

            <!-- Legend -->
            <div class="legend">
                <div class="legend-item">
                    <div class="seat available"></div> Available
                </div>
                <div class="legend-item">
                    <div class="seat booked"></div> Booked
                </div>
                <div class="legend-item">
                    <div class="seat selected"></div> Selected
                </div>
            </div>

            <!-- Layout -->
            <div class="bus-layout">

                <div class="driver-area">
                    <i class="fas fa-steering-wheel"></i> Driver
                </div>

                <form id="seatForm" method="POST" action="/book_seats/{{ bus.id }}">

                    <!-- Hidden input (IMPORTANT FIX) -->
                    <input type="hidden" name="seats_list" id="seats_list">

                    <div id="seatsContainer" class="text-center"></div>

                    <!-- Passenger Details -->
                    <div class="row mt-4">
                        <div class="col-md-6">
                            <input type="text" class="form-control" name="passenger_name" placeholder="Passenger Name" required>
                        </div>
                        <div class="col-md-6">
                            <input type="tel" class="form-control" name="phone" placeholder="Phone Number" required>
                        </div>
                    </div>

                    <!-- Booking Summary -->
                    <div class="booking-summary mt-3">
                        <p><strong>Selected Seats:</strong> <span id="selectedSeats">None</span></p>
                        <p><strong>Seats:</strong> <span id="seatCount">0</span></p>
                        <p><strong>Total:</strong> ₹<span id="totalAmount">0</span></p>
                    </div>

                    <!-- Buttons -->
                    <div class="text-center mt-3">
                        <a href="/search" class="btn btn-secondary">Back</a>
                        <button type="submit" class="btn btn-primary" id="proceedBtn" disabled>
                            Proceed to Payment
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const totalSeats = {{ bus.seats_total }};
    const bookedSeats = {{ booked_seats|tojson }};
    const seatPrice = {{ bus.price }};

    let selectedSeats = [];

    function createSeatsLayout() {
        const container = document.getElementById('seatsContainer');

        for (let i = 1; i <= totalSeats; i += 4) {
            const row = document.createElement('div');
            row.className = 'seat-row';

            for (let j = 0; j < 4 && (i + j) <= totalSeats; j++) {
                const seatNum = (i + j).toString(); // FIXED
                const seat = createSeat(seatNum);
                row.appendChild(seat);

                if (j === 1) {
                    const aisle = document.createElement('div');
                    aisle.style.width = "30px";
                    row.appendChild(aisle);
                }
            }

            container.appendChild(row);
        }
    }

    function createSeat(seatNum) {
        const div = document.createElement('div');
        div.className = 'seat';
        div.innerText = seatNum;

        if (bookedSeats.includes(seatNum)) {
            div.classList.add('booked');
        } else {
            div.classList.add('available');
            div.onclick = () => toggleSeat(seatNum, div);
        }

        return div;
    }

    function toggleSeat(seatNum, el) {
        if (selectedSeats.includes(seatNum)) {
            selectedSeats = selectedSeats.filter(s => s !== seatNum);
            el.classList.remove('selected');
            el.classList.add('available');
        } else {
            selectedSeats.push(seatNum);
            el.classList.remove('available');
            el.classList.add('selected');
        }

        updateSummary();
    }

    function updateSummary() {
        document.getElementById('selectedSeats').innerText =
            selectedSeats.length ? selectedSeats.join(', ') : 'None';

        document.getElementById('seatCount').innerText = selectedSeats.length;

        document.getElementById('totalAmount').innerText =
            (selectedSeats.length * seatPrice).toFixed(2);

        document.getElementById('seats_list').value = selectedSeats.join(','); // FIX

        document.getElementById('proceedBtn').disabled = selectedSeats.length === 0;
    }

    createSeatsLayout();
    updateSummary();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Select Seats</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .bus {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .seat {
      width: 60px;
      height: 60px;
      background: #ddd;
      cursor: pointer;
      line-height: 60px;
      border-radius: 8px;
    }

    .booked {
      background: red;
      cursor: not-allowed;
    }

    .selected {
      background: green;
      color: white;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: orange;
      border: none;
      color: white;
    }
  </style>
</head>
<body>

<h2>Select Seats</h2>

<form method="POST" action="/book/{{ bus.id }}">
  
  <div class="bus">
    {% for i in range(1, 41) %}
      {% if i|string in booked_seats %}
        <div class="seat booked">{{ i }}</div>
      {% else %}
        <div class="seat" onclick="selectSeat(this)">{{ i }}</div>
      {% endif %}
    {% endfor %}
  </div>

  <input type="hidden" name="seats" id="selectedSeats">

  <br>
  <input type="text" name="name" placeholder="Passenger Name" required>

  <br><br>
  <button type="submit">Confirm Booking</button>

</form>

<script>
let selected = [];

function selectSeat(el) {
  let seat = el.innerText;

  if (selected.includes(seat)) {
    selected = selected.filter(s => s !== seat);
    el.classList.remove("selected");
  } else {
    selected.push(seat);
    el.classList.add("selected");
  }

  document.getElementById("selectedSeats").value = selected.join(",");
}
</script>

</body>
</html>
